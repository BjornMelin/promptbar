name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.95.0"

jobs:
  app:
    name: App
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format

      - name: Verify app
        run: bun run verify

  rust:
    name: Rust MSRV
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust MSRV
        run: rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo +$RUST_VERSION fmt --all --check

      - name: Clippy
        run: cargo +$RUST_VERSION clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo +$RUST_VERSION test --workspace --all-targets --all-features --locked

  e2e:
    name: Chromium E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Rust MSRV
        run: rustup toolchain install "$RUST_VERSION" --profile minimal

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build promptops
        run: cargo +$RUST_VERSION build --locked -p promptops-cli

      - name: Install Chromium
        run: bun run playwright install --with-deps chromium

      - name: Run desktop and mobile E2E tests
        env:
          PROMPTOPS_BIN: ${{ github.workspace }}/target/debug/promptops
        run: bun run test:e2e
